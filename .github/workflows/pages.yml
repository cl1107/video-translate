name: Deploy Landing Page

# 将 apps/landing 构建产物发布到 GitHub Pages
# 站点地址: https://cl1107.github.io/video-translate/
on:
  push:
    branches:
      - main
    paths:
      - 'apps/landing/**'
      - '.github/workflows/pages.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          # 仍关闭 setup-node 自动缓存：此时 pnpm 尚未安装，自动 cache 会踩坑
          package-manager-cache: false

      - name: Set up pnpm
        run: npm install --global pnpm@11.12.0

      # 显式缓存 pnpm store（不是 node_modules）：锁文件未变时可大幅缩短 install
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing page
        # vite.config.ts 在 GITHUB_ACTIONS=true 时使用 base=/video-translate/
        env:
          GITHUB_ACTIONS: 'true'
        run: pnpm --filter @video-translate/landing run build

      - name: Add SPA fallback for project pages
        # 子路径刷新时避免 404（静态托管无服务端路由）
        run: cp apps/landing/dist/index.html apps/landing/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
