name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.variant }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS-arm64
            os: macos-15
            variant: bundled-ffmpeg
            bundle_ffmpeg: '1'
          - platform: macOS-arm64
            os: macos-15
            variant: slim
            bundle_ffmpeg: '0'
          - platform: Windows-x64
            os: windows-2025
            variant: bundled-ffmpeg
            bundle_ffmpeg: '1'
          - platform: Windows-x64
            os: windows-2025
            variant: slim
            bundle_ffmpeg: '0'
          - platform: Linux-x64
            os: ubuntu-24.04
            variant: bundled-ffmpeg
            bundle_ffmpeg: '1'
          - platform: Linux-x64
            os: ubuntu-24.04
            variant: slim
            bundle_ffmpeg: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.12.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node -e "const version = require('./apps/desktop/package.json').version;
          const expected = 'v' + version;
          if (process.env.RELEASE_TAG !== expected) {
            console.error('Release tag must be ' + expected);
            process.exit(1);
          }"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Linux package indexes
        if: runner.os == 'Linux'
        run: sudo apt-get update

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get install --yes libarchive-tools rpm

      - name: Build unsigned release packages
        env:
          BUNDLE_FFMPEG: ${{ matrix.bundle_ffmpeg }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          UNSIGNED_BUILD: '1'
        run: pnpm --filter video-translate run build:ci

      - name: Upload release packages
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}-${{ matrix.variant }}
          path: |
            apps/desktop/dist/v*/video-translate-v*
            !apps/desktop/dist/v*/*.blockmap
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: sha256sum ./* > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --generate-notes --title "$RELEASE_TAG"
          fi
